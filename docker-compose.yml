services:
  tests:
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./allure-results:/app/allure-results
    command: pytest --alluredir=allure-results --clean-alluredir

  allure:
    image: frankescobar/allure-docker-service
    ports:
      - "5050:5050"
    volumes:
      - ./allure-results:/app/allure-results
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 1
      KEEP_HISTORY: 1